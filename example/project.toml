[project]
name        = "opamp-examples"
title       = "Opamp Circuit Simulation Examples"
description = "Standard frequency and transient analyses for three opamp configurations."
date        = "2026-05-17"
author      = "Simon Hobbs"
revision    = "1.0"
categories  = ["product"]
tags        = ["hardware"]

[project.paths]
report = "build/opamp-examples.md"
build  = "build"

[[circuits]]
name        = "Differentiating Opamp"
slug        = "differentiating-opamp"
asc         = "circuits/differentiating-opamp.asc"
input_node  = "IN"
output_node = "OUT"
suite_type  = "opamp_standard"

[[circuits.plots]]
label = "step_response"
title = "Step Response"
vars  = ["V(IN)", "V(OUT)"]

[[circuits.plots]]
label = "ac_sweep"
title = "AC Sweep"
vars  = ["V(OUT)"]
db    = true

[[circuits.plots]]
label = "noise"
title = "Noise"

