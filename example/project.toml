[project]
name = "opamp-examples"
title = "Opamp Circuit Simulation Examples"
description = "Standard frequency and transient analyses for three opamp configurations: differentiating, integrating, and non-inverting."
date = "2026-05-17"
author = "Simon Hobbs"
revision = "1.0"

[project.paths]
# All paths are relative to this file's directory (simulation_reporter/).
hugo_root = ".."
report = "build/opamp-examples.md"
build = "build"

[[circuits]]
name = "Differentiating Opamp"
slug = "differentiating-opamp"
asc = "../ltspice_runner/example/differentiating-opamp.asc"
input_node = "IN"
output_node = "OUT"
test_suite = "opamp_standard"
existing_sim_dir = "../../ltspice_runner/example/build/differentiating-opamp"

[[circuits]]
name = "Integrating Opamp"
slug = "integrating-opamp"
asc = "../ltspice_runner/example/integrating-opamp.asc"
input_node = "IN"
output_node = "OUT"
test_suite = "opamp_standard"
existing_sim_dir = "../../ltspice_runner/example/build/integrating-opamp"

[[circuits]]
name = "Non-Inverting Opamp"
slug = "noninverting-opamp"
asc = "../ltspice_runner/example/noninverting-opamp.asc"
input_node = "IN"
output_node = "OUT"
test_suite = "opamp_standard"
existing_sim_dir = "../../ltspice_runner/example/build/noninverting-opamp"

[[circuits]]
name = "Inverting Opamp"
slug = "inverting-opamp"
asc = "../ltspice_runner/example/inverting-opamp.asc"
input_node = "IN"
output_node = "OUT"
test_suite = "opamp_standard"
existing_sim_dir = "../../ltspice_runner/example/build/inverting-opamp"
